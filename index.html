<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porsche Georgia | Official Website</title>
    <link rel="stylesheet" href="./styles/paged/main.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="header-left">
          <img
            class="burger-menu"
            src="./assets/icons/menu-lines-white.png"
            alt="burger menu"
          />
          <p class="menu">Menu</p>
        </div>
        <div class="header-middle">
          <img
            class="porsche-logo"
            src="./assets/icons/porsche-logo.png"
            alt="porsche-logo"
          />
          <img
            class="porsche-title"
            src="./assets/images/porsche-title.png"
            alt="Porsche-title"
          />
        </div>
        <div class="header-right">
          <img
            class="globe-icon"
            src="./assets/icons/globe-white.png"
            alt="globe"
          />
          <div class="globe-tooltip">Country Selector</div>
        </div>
      </div>
    </header>
    <main>
      <section class="hero-section section1"></section>
      <section class="section2">
        <div class="section2-container">
          <video
            class="page-video"
            autoplay
            loop
            muted
            src="./assets/videos/hero-video.mp4"
          ></video>
          <div class="page-content">
            <h1 class="page-title">Porsche Sonderwunsch The "Tree Of Life"</h1>
            <button class="cta-btn read-btn">Read More</button>
          </div>
        </div>
      </section>
      <section class="section3"></section>
      <section class="section4"></section>
    </main>
    <footer></footer>
  </body>
</html>
