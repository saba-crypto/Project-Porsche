<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porsche Georgia | Official Website</title>
    <link rel="stylesheet" href="./styles/paged/main.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/icons/porsche-logo.ico"
    />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="header-left">
          <img
            class="burger-menu"
            src="./assets/icons/menu-lines-white.png"
            alt="burger menu"
          />
          <p class="menu">Menu</p>
        </div>
        <div class="header-middle">
          <img
            class="porsche-logo"
            src="./assets/icons/porsche-logo.png"
            alt="porsche-logo"
          />
          <img
            class="porsche-title"
            src="./assets/images/porsche-title.png"
            alt="Porsche-title"
          />
        </div>
        <div class="header-right">
          <img
            class="globe-icon"
            src="./assets/icons/globe-white.png"
            alt="globe"
          />
          <div class="globe-tooltip">Country Selector</div>
        </div>
      </div>
    </header>
    <main>
      <section class="section1 hero-section">
        <div class="section1-container">
          <video
            class="page-video"
            autoplay
            loop
            muted
            src="./assets/videos/hero-video.mp4"
          ></video>
          <div class="page-content">
            <h1 class="page-title">Porsche Sonderwunsch The "Tree Of Life"</h1>
            <button class="cta-btn read-btn">Read More</button>
          </div>
          <button class="video-playback-btn">
            <img
              class="pause-icon"
              src="./assets/icons/pause.png"
              alt="pause-icon"
            />
            <img
              class="play-icon"
              src="./assets/icons/play.png"
              alt="play-icon"
            />
          </button>
        </div>
      </section>
      <section class="section2">
        <div class="section2-container">
          <article>
            <img
              class="article-banner"
              src="./assets/images/red-macan.webp"
              alt="Porsche-Macan"
            />
            <div class="article-content">
              <p class="article-name">The New Macan GTS.</p>
              <button class="arrow-btn">
                <img
                  src="./assets/icons/white-arrow-right.png"
                  alt="white-arrow-right"
                />
              </button>
            </div>
          </article>
          <article>
            <img
              class="article-banner"
              src="./assets/images/white-panamera.webp"
              alt="Porsche-Macan"
            />
            <div class="article-content">
              <p class="article-name">Panamera 4 E-Hybrid.</p>
              <button class="arrow-btn">
                <img
                  src="./assets/icons/white-arrow-right.png"
                  alt="white-arrow-right"
                />
              </button>
            </div>
          </article>
          <article>
            <img
              class="article-banner"
              src="./assets/images/green-cayenne.webp"
              alt="Porsche-Macan"
            />
            <div class="article-content">
              <p class="article-name">The new Cayenne Electric.</p>
              <button class="arrow-btn">
                <img
                  src="./assets/icons/white-arrow-right.png"
                  alt="white-arrow-right"
                />
              </button>
            </div>
          </article>
        </div>
      </section>
    </main>
    <footer></footer>
    <script src="./scripts/home-page/scripts.js"></script>
  </body>
</html>
